# ESPHome config for the Seeed reTerminal E1002 (7.3" Spectra 6 colour e-paper).
#
# Modelled on cromelex's known-good config for this exact device
# (github.com/cromelex/e1002-esphome-dashboard), trimmed to a single dashboard.
# The E1002 is built on a XIAO ESP32-S3, so the board is `seeed_xiao_esp32s3`
# (NOT a generic esp32-s3 devkit) and it needs the on-board battery/SD enable
# pins switched on at boot.
#
# On wake: enable the rails, read which dashboard to show (sensor.eink_dashboard),
# fetch that Puppet screenshot, draw it, stay awake briefly for OTA, then deep-sleep
# for the seconds reported by HA's sensor.eink_seconds_until_refresh. Both sensors
# come from the schedule-driven ha/eink_schedule component.
#
# Requires ESPHome >= 2025.11 (for the epaper_spi / Seeed-reTerminal-E1002 model).

substitutions:
  name: reterminal-eink
  friendly_name: reTerminal E-ink
  # Puppet screenshot. The dashboard/view path is chosen at runtime from
  # sensor.eink_dashboard (see text_sensor + on_boot), so only the host + render
  # query live here. Use the HA IP if mDNS is flaky on the ESP32.
  #
  # We DON'T use ?device=seeed-reterminal-e1002: that preset matches the panel's
  # real (muted) inks, whose green sits near mid-grey, so our deliberate greys
  # (weather bars + icons) dither into colour noise. A pure palette (green=00FF00,
  # far from grey) + floyd-steinberg keeps greys as clean B/W halftones while the
  # solid-ink price bars don't dither. &wait=6000 gives calendar-card-pro time to
  # fetch its events (Puppet's default ~2.5s/750ms catches "Loading calendar events").
  puppet_host: "http://homeassistant.local:10000"
  image_query: "viewport=800x480&colors=000000,FFFFFF,FF0000,FFFF00,0000FF,00FF00&dithering=floyd-steinberg&wait=6000"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: 600 # power up the on-board rails first
      then:
        - output.turn_on: bsp_battery_enable
        - output.turn_on: bsp_sd_enable
    - priority: -100
      then:
        - delay: 5s # let WiFi/API/time settle (and sensor.eink_dashboard arrive)
        - lambda: |-
            // Build the Puppet URL for the dashboard HA says to show right now.
            std::string url = std::string("${puppet_host}/e-ink/") + id(dashboard_path) + "?${image_query}";
            id(dashboard_image).set_url(url);
        - component.update: dashboard_image # fetch + draw
        - delay: 45s # stay awake a moment so OTA updates can land
        - deep_sleep.enter:
            id: deep_sleep_ctl
            sleep_duration: !lambda "return (uint64_t) id(next_sleep_seconds) * 1000;"

esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: UART0 # report logs over USB on this device

api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

time:
  - platform: homeassistant
    id: ha_time

http_request:
  verify_ssl: false
  timeout: 15s
  watchdog_timeout: 20s # Puppet's first (cold) render can be slow; don't hang

i2c:
  scl: GPIO20
  sda: GPIO19

globals:
  - id: next_sleep_seconds
    type: int
    restore_value: false
    initial_value: "21600" # 6h fallback if HA is unreachable
  - id: dashboard_path
    type: std::string
    restore_value: false
    initial_value: '"panel"' # fallback view if HA hasn't reported one yet

sensor:
  # Seconds until the next scheduled refresh, from the HA template sensor.
  - platform: homeassistant
    id: ha_sleep_seconds
    entity_id: sensor.eink_seconds_until_refresh
    on_value:
      - lambda: "id(next_sleep_seconds) = (int) x;"
  - platform: adc
    pin: GPIO1
    name: "reTerminal battery voltage"
    attenuation: 12db
    update_interval: 60s
    filters:
      - multiply: 2.0 # on-board divider
  - platform: sht4x # on-board tem/humidity sensor
    temperature:
      name: "reTerminal temperature"
    humidity:
      name: "reTerminal humidity"
    update_interval: 60s

text_sensor:
  # Which dashboard/view to show now, from the schedule-driven HA sensor.
  - platform: homeassistant
    id: ha_dashboard
    entity_id: sensor.eink_dashboard
    on_value:
      - lambda: "id(dashboard_path) = x;"

output:
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable
  - platform: gpio
    pin: GPIO16
    id: bsp_sd_enable

online_image:
  - id: dashboard_image
    url: "${puppet_host}/e-ink/panel?${image_query}" # default; overridden per-wake via set_url
    format: PNG
    type: RGB565
    buffer_size: 65536
    update_interval: never
    on_download_finished:
      - component.update: eink

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: epaper_spi
    id: eink
    model: Seeed-reTerminal-E1002
    update_interval: never
    lambda: |-
      if (id(dashboard_image).get_width() > 0) {
        it.image(0, 0, id(dashboard_image));
      }

deep_sleep:
  id: deep_sleep_ctl
  # Duration is set per-wake from the HA sensor (see on_boot). The button on
  # GPIO3 also wakes the device for an on-demand refresh.
  wakeup_pin:
    number: GPIO3
    inverted: true
