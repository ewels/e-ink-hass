# Lovelace view for the reTerminal E1002 e-ink panel.
#
# Use a DEDICATED dashboard in PANEL mode so the single eink-panel-card fills the
# 800x480 viewport that the Puppet add-on screenshots. To install:
#   Settings → Dashboards → Add dashboard → (open it) → ⋮ → Edit dashboard →
#   ⋮ → Raw configuration editor → paste this file's contents.
#
# Then point Puppet at this dashboard's URL (e.g. /eink/home) at 800x480, and set
# that screenshot URL as `image_url` in device/reterminal-e1002.yaml.
#
# The entity IDs below are examples — map them to your own Home Assistant
# entities. In particular `calendar.personal` / `calendar.family` are
# placeholders for your calendar entities.

title: E-ink
views:
  - title: Panel
    path: home
    panel: true # single card fills the viewport
    cards:
      - type: custom:eink-panel-card
        # Weather: community clock-weather-card (install via HACS), styled to the
        # monochrome e-ink look with card-mod (also a HACS dependency) — line
        # icons recoloured to black, white range-bar tracks with grey fill, both
        # bordered. This mirrors the cromelex reference setup.
        weather:
          type: custom:clock-weather-card
          entity: weather.forecast_home
          sun_entity: sun.sun
          forecast_rows: 4
          hide_clock: true # show condition + temperature, not a clock
          hide_date: true
          weather_icon_type: line
          animated_icon: false
          card_mod:
            style: |
              ha-card {
                font-weight: 700;
                padding: 0px !important;
              }
              forecast-temperature-bar-range {
                background: #808080 !important; /* mid-grey → dithers to a black/white halftone */
                border: 1px solid black;
                box-sizing: border-box;
              }
              forecast-temperature-bar-background {
                opacity: 1 !important;
                background: white !important;
                border: 1px solid black !important;
                border-radius: 15px !important;
                box-sizing: border-box !important;
              }
              forecast-icon {
                filter: grayscale(1) brightness(0.4);
              }
              clock-weather-card-today-left {
                filter: grayscale(1) brightness(0);
              }
        price:
          entity: sensor.greenely_prices
          title: Electricity
          low_threshold: 50 # öre/kWh — green below
          high_threshold: 200 # öre/kWh — red above
          cheapest_window: 8 # quarter-hours (= 2h); 0 to hide
        # Calendar: community calendar-card-pro (install via HACS).
        calendar:
          type: custom:calendar-card-pro
          days_to_show: 3
          time_24h: true
          show_location: true
          entities:
            - entity: calendar.family
              color: "#0000ff" # blue
            - entity: calendar.personal
              color: "#008000" # green
            - entity: calendar.holidays_in_sweden
              color: "#ff0000" # red
