<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>e-ink panel dev harness</title>
    <style>
      body {
        margin: 0;
        background: #4a4a4a;
        font-family: Helvetica, Arial, sans-serif;
        padding: 24px;
      }
      .label {
        color: #fff;
        font-size: 12px;
        margin: 0 0 8px 2px;
        opacity: 0.8;
      }
      /* The real panel: 800×480 (the card sets its own size). */
      .frame {
        width: 800px;
        height: 480px;
        box-shadow: 0 0 0 1px #000;
      }
    </style>
  </head>
  <body>
    <p class="label" id="src">loading…</p>
    <div class="frame"><eink-panel-card id="panel"></eink-panel-card></div>

    <script type="module">
      import "../dist/eink-dashboard-cards.js";

      // Shim HA's loadCardHelpers so the panel card can build children in the
      // harness exactly as it does in Home Assistant. (Community cards like
      // clock-weather-card aren't loaded here, so those slots stay blank — the
      // dashboard uses them in HA; the harness uses the bundled custom cards.)
      window.loadCardHelpers = async () => ({
        createCardElement(config) {
          const tag = String(config.type || "").replace(/^custom:/, "");
          const el = document.createElement(tag);
          if (typeof el.setConfig === "function") el.setConfig(config);
          return el;
        },
      });

      // --- mock snapshot (used when dev/hass-snapshot.json is absent) ---
      function mockSnapshot() {
        const hourly = [
          1.39, 1.32, 1.24, 1.03, 0.89, 1.17, 1.52, 1.85, 1.69, 1.43, 1.27, 1.1, 0.95, 0.88,
          0.84, 0.9, 1.12, 1.55, 1.95, 1.78, 1.42, 1.08, 0.72, 0.5,
        ];
        const now = new Date();
        const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const date = midnight.toDateString();
        const pts = [];
        for (let h = 0; h < 24; h++)
          for (let q = 0; q < 4; q++) {
            const t = new Date(midnight.getTime() + (h * 60 + q * 15) * 60000);
            pts.push({
              date,
              time: `${String(h).padStart(2, "0")}:${String(q * 15).padStart(2, "0")}`,
              start: t.toISOString(),
              price: Math.max(0.1, +(hourly[h] + (q - 1.5) * 0.04).toFixed(4)),
            });
          }
        const fc = (off, condition, hi, lo) => ({
          datetime: new Date(midnight.getTime() + off * 86400000).toISOString(),
          condition,
          temperature: hi,
          templow: lo,
        });
        const evt = (off, time, summary, allDay) => {
          const d = new Date(midnight.getTime() + off * 86400000);
          if (allDay) return { start: { date: d.toISOString().slice(0, 10) }, summary };
          const [hh, mm] = time.split(":");
          d.setHours(+hh, +mm);
          return { start: { dateTime: d.toISOString() }, summary };
        };
        return {
          states: {
            "sensor.greenely_prices": {
              state: "0.9",
              attributes: { unit_of_measurement: "SEK/kWh", current_day_quarterly: pts },
            },
            "weather.forecast_home": {
              state: "cloudy",
              attributes: { temperature: 18, temperature_unit: "°C" },
            },
          },
          forecasts: {
            "weather.forecast_home": {
              forecast: [
                fc(0, "cloudy", 19, 12),
                fc(1, "partlycloudy", 21, 13),
                fc(2, "rainy", 17, 11),
                fc(3, "sunny", 23, 14),
              ],
            },
          },
          calendars: {
            "calendar.family": [
              evt(0, "17:00", "Group evening activity"),
              evt(1, "", "Semester", true),
              evt(2, "18:30", "Concert"),
            ],
            "calendar.personal": [evt(0, "09:00", "Standup")],
            "calendar.holidays_in_sweden": [],
          },
        };
      }

      function makeCallApi(snap) {
        return async (method, path) => {
          if (path.startsWith("services/weather/get_forecasts"))
            return { service_response: snap.forecasts || {} };
          const m = path.match(/^calendars\/([^?]+)/);
          if (m) return (snap.calendars && snap.calendars[decodeURIComponent(m[1])]) || [];
          return null;
        };
      }

      async function loadSnapshot() {
        try {
          const r = await fetch("./hass-snapshot.json");
          if (r.ok) {
            document.getElementById("src").textContent = "data: dev/hass-snapshot.json (real HA)";
            return await r.json();
          }
        } catch {
          /* no snapshot */
        }
        document.getElementById("src").textContent = "data: mock (run `npm run snapshot` for real data)";
        return mockSnapshot();
      }

      const snap = await loadSnapshot();
      const hass = { states: snap.states, callApi: makeCallApi(snap) };

      const panel = document.getElementById("panel");
      panel.setConfig({
        weather: { entity: "weather.forecast_home", days: 4 },
        price: { entity: "sensor.greenely_prices", title: "Electricity" },
        calendar: {
          title: "Calendar",
          days: 3,
          entities: [
            { entity: "calendar.family", color: "#0000ff" },
            { entity: "calendar.personal", color: "#008000" },
            { entity: "calendar.holidays_in_sweden", color: "#ff0000" },
          ],
        },
      });
      panel.hass = hass;
    </script>
  </body>
</html>
