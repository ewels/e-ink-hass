# ESPHome config for the Seeed reTerminal E1002 (7.3" Spectra 6 colour e-paper).
#
# On each wake:
#   1. Connect Wi-Fi + HA API.
#   2. Read sensor.eink_seconds_until_refresh from Home Assistant.
#   3. Download the dashboard image from the Puppet add-on (already dithered to
#      the 6 inks) and draw it.
#   4. Deep-sleep for the seconds from step 2 — i.e. until exactly the next
#      scheduled time (05:30 / 15:30 / 19:00). Change the schedule in
#      ha/seconds-until-wake.yaml; never reflash.
#
# Requires ESPHome >= 2025.11 for the `epaper_spi` / Seeed-reTerminal-E1002 model.

substitutions:
  name: reterminal-eink
  # Puppet add-on screenshot endpoint: <ha-host>:10000/<dashboard-path>?params.
  #   colors    = the six inks. Cards use these EXACT hex values, so solid colours
  #               map 1:1 (no dithering). Green is 00FF00 (not 008000) so it sits
  #               far from mid-grey — greys then dither to black/white, not onto green.
  #   dithering = floyd-steinberg (DEFAULTS TO none — without it there are no greys!)
  # Use the HA IP instead of homeassistant.local if mDNS is flaky on the ESP32.
  image_url: "http://homeassistant.local:10000/e-ink/panel?viewport=800x480&colors=000000,FFFFFF,FF0000,FFFF00,0000FF,00FF00&dithering=floyd-steinberg"

esphome:
  name: ${name}
  friendly_name: reTerminal E-ink
  on_boot:
    priority: -100
    then:
      - logger.log: "Awake — fetching dashboard"
      - delay: 2s # let the HA sensor value arrive over the API
      - component.update: dashboard_image

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
ota:
  - platform: esphome

http_request:
  timeout: 10s
  verify_ssl: false

globals:
  - id: next_sleep_seconds
    type: int
    restore_value: false
    initial_value: "21600" # 6h fallback if HA is unreachable

# Pull the seconds-until-next-refresh straight from the HA template sensor.
sensor:
  - platform: homeassistant
    id: ha_sleep_seconds
    entity_id: sensor.eink_seconds_until_refresh
    on_value:
      then:
        - lambda: "id(next_sleep_seconds) = (int) x;"
  - platform: adc
    pin: GPIO1
    name: "reTerminal battery voltage"
    attenuation: 12db
    filters:
      - multiply: 2.0 # on-board divider

online_image:
  - id: dashboard_image
    url: ${image_url}
    format: PNG
    type: RGB565
    update_interval: never
    on_download_finished:
      then:
        - component.update: eink
        - delay: 2s # allow the panel refresh to complete
        - deep_sleep.enter:
            id: deep_sleep_ctl
            sleep_duration: !lambda "return (uint64_t) id(next_sleep_seconds) * 1000;"

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: epaper_spi
    id: eink
    model: Seeed-reTerminal-E1002
    cs_pin: GPIO10
    dc_pin: GPIO11
    reset_pin: GPIO12
    busy_pin: GPIO13
    update_interval: never
    pages:
      - id: page_image
        lambda: |-
          if (id(dashboard_image).get_width() > 0) {
            it.image(0, 0, id(dashboard_image));
          }

deep_sleep:
  id: deep_sleep_ctl
  # Duration is set per-wake from the HA sensor (see online_image above).
  # The right-hand button also wakes the device for an on-demand refresh.
  wakeup_pin:
    number: GPIO4
    inverted: true
